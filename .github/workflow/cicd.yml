name: Deploy Go Application

on:
  push:
    branches:
      - deploy-to-ec2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Create .env file
        run: echo "Port=${{ secrets.port }}" > .env
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      - name: Build Docker image
        run: docker build -t aman17101/pingpong:latest .
      - name: Push Docker image
        run: docker push aman17101/pingpong:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Docker image
        run: docker pull aman17101/pingpong:latest
      - name: Delete old container
        run: docker rm -f ping-pong || true
      - name: Run Docker container
        run: docker run -d -p 8080:8080 --name ping-pong aman17101/pingpong:latest
