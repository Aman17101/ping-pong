name: Deploy Ping-Pong App

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Stop existing container
        run: |
          docker stop pingpong-app || true
          docker rm pingpong-app || true

      - name: Build Docker Image
        run: docker build -t pingpong-image:latest .

      - name: Run New Container
        run: docker run -d --name pingpong-app -p 8080:8080 pingpong-image:latest
